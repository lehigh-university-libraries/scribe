services:
  mariadb:
    image: mariadb:12.2@sha256:b1cb255a9939d28a1856815f0de6046c20c28c21b92a9f2696bc782b247a47ee
    environment:
      MARIADB_DATABASE: scribe
      MARIADB_USER: scribe
      MARIADB_PASSWORD: scribe
      MARIADB_ROOT_PASSWORD: root
    volumes:
      - mariadb-data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "healthcheck.sh", "--connect", "--innodb_initialized"]
      interval: 5s
      timeout: 3s
      retries: 20

  api:
    image: ghcr.io/lehigh-university-libraries/scribe:main
    build: .
    env_file:
      - .env
    environment:
      LISTEN_ADDR: :8080
      DATABASE_DSN: scribe:scribe@tcp(mariadb:3306)/scribe?parseTime=true
      ANNOTATION_API_BASE: http://localhost:8080
      CANTALOUPE_IIIF_BASE: http://localhost:8182/iiif/2
      CANTALOUPE_IIIF_INTERNAL_BASE: http://cantaloupe:8182/iiif/2
    ports:
      - "8080:8080"
    volumes:
      - uploads-data:/app/uploads
      - cache-data:/app/cache
    depends_on:
      mariadb:
        condition: service_healthy

  cantaloupe:
    image: islandora/cantaloupe:6@sha256:7aec54fbb95e1cc480f2444245b690b3a780327e3179269d4a6fd0b15b04bfb5
    environment:
      CANTALOUPE_SOURCE_STATIC: FilesystemSource
      CANTALOUPE_FILESYSTEMSOURCE_LOOKUP_STRATEGY: BasicLookupStrategy
      CANTALOUPE_FILESYSTEMSOURCE_BASICLOOKUPSTRATEGY_PATH_PREFIX: /uploads/
      CANTALOUPE_ENDPOINT_IIIF_2_ENABLED: "true"
      CANTALOUPE_ENDPOINT_IIIF_3_ENABLED: "true"
      CANTALOUPE_HTTP_PORT: "8182"
    ports:
      - "8182:8182"
    volumes:
      - uploads-data:/uploads:ro
      - cantaloupe-data:/data
    depends_on:
      - api

volumes:
  mariadb-data:
  uploads-data:
  cache-data:
  cantaloupe-data:
