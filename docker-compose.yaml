services:
  traefik:
    image: traefik:v3.6.10@sha256:c549d482c55d7a797398562064f35428cc53e748d84d7190997930e7b31bcc32
    command: >-
      --entryPoints.web.address=:80
      --entryPoints.web.forwardedHeaders.trustedIPs=10.0.0.0/8,127.0.0.1/32,172.0.0.0/8
      --entryPoints.web.transport.respondingTimeouts.readTimeout=3600
      --providers.file.filename=/etc/traefik/dynamic.yaml
      --providers.file.watch=true
    environment:
      TRAEFIK_TLS_FRONTEND: ${TRAEFIK_TLS_FRONTEND:-false}
    ports:
      - "80:80"
    volumes:
      - ./conf/traefik/traefik.dynamic.yaml:/etc/traefik/dynamic.yaml:ro
    depends_on:
      - api
      - cantaloupe

  mariadb:
    image: mariadb:12.2@sha256:e16f61b8f6ed25111adbb1c5c19bbc2904efc8ed14029999af0cbe1c7ae18bf1
    environment:
      MARIADB_DATABASE: ${MARIADB_DATABASE:-scribe}
      MARIADB_USER: ${MARIADB_USER:-scribe}
      MARIADB_PASSWORD_FILE: /run/secrets/mariadb_password
      MARIADB_ROOT_PASSWORD_FILE: /run/secrets/mariadb_root_password
    volumes:
      - mariadb-data:/var/lib/mysql
    secrets:
      - mariadb_password
      - mariadb_root_password
    healthcheck:
      test: ["CMD", "healthcheck.sh", "--connect", "--innodb_initialized"]
      interval: 5s
      timeout: 3s
      retries: 20

  api:
    image: ${SCRIBE_API_IMAGE:-ghcr.io/lehigh-university-libraries/scribe:main}
    build: .
    env_file:
      - .env
    environment:
      LISTEN_ADDR: :8080
      ANNOTATION_API_BASE: ${ANNOTATION_API_BASE:-/}
      CANTALOUPE_IIIF_BASE: ${CANTALOUPE_IIIF_BASE:-/cantaloupe/iiif/2}
      CANTALOUPE_IIIF_INTERNAL_BASE: ${CANTALOUPE_IIIF_INTERNAL_BASE:-http://cantaloupe:8182/iiif/2}
    volumes:
      - uploads-data:/app/uploads
      - cache-data:/app/cache
    secrets:
      - mariadb_password
    depends_on:
      mariadb:
        condition: service_healthy

  cantaloupe:
    image: islandora/cantaloupe:6@sha256:09b200648f68698f57d16ee32bc884903eead7576dfaadb589fbaf7efb4fbf02
    environment:
      CANTALOUPE_SOURCE_STATIC: FilesystemSource
      CANTALOUPE_FILESYSTEMSOURCE_LOOKUP_STRATEGY: BasicLookupStrategy
      CANTALOUPE_FILESYSTEMSOURCE_BASICLOOKUPSTRATEGY_PATH_PREFIX: /uploads/
      CANTALOUPE_ENDPOINT_IIIF_2_ENABLED: "true"
      CANTALOUPE_ENDPOINT_IIIF_3_ENABLED: "true"
      CANTALOUPE_HTTP_PORT: "8182"
    volumes:
      - uploads-data:/uploads:ro
      - cantaloupe-data:/data

volumes:
  mariadb-data:
  uploads-data:
  cache-data:
  cantaloupe-data:

secrets:
  mariadb_password:
    file: ./secrets/mariadb_password
  mariadb_root_password:
    file: ./secrets/mariadb_root_password
