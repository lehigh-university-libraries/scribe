name: lint-test
on:
  workflow_call:
    inputs:
      checkout_ref:
        required: false
        type: string
        default: ""
      image_tag:
        required: false
        type: string
        default: ""
  workflow_dispatch:

permissions:
  contents: read

jobs:
  lint-test:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          ref: ${{ inputs.checkout_ref != '' && inputs.checkout_ref || github.sha }}

      - name: Set up Go
        uses: actions/setup-go@4b73464bb391d4059bd26b0524d20df3927bd417 # v6

      - name: Log in to GHCR
        if: inputs.image_tag != ''
        uses: docker/login-action@c94ce9fb468520275223c153574b00df6fe4bcc9 # v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Pull published app image
        if: inputs.image_tag != ''
        run: docker pull "${{ inputs.image_tag }}"

      - run: make lint

      - name: Run tests against published image
        if: inputs.image_tag != ''
        run: |
          SCRIBE_API_IMAGE="${{ inputs.image_tag }}" COMPOSE_UP_FLAGS="-d" make up test

      - name: Build local image and run tests
        if: inputs.image_tag == ''
        run: make build up test
