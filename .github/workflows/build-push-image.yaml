name: Build Push Image

on:
  workflow_call:
    inputs:
      checkout_ref:
        required: true
        type: string
      image_tag:
        required: true
        type: string
      extra_image_tag:
        required: false
        type: string
        default: ""
    outputs:
      image:
        description: Primary pushed image reference.
        value: ${{ jobs.build.outputs.image }}

jobs:
  build:
    runs-on: ubuntu-24.04
    permissions:
      contents: read
      packages: write
    outputs:
      image: ${{ steps.refs.outputs.image }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@8e8c483db84b4bee98b60c0593521ed34d9990e8 # v6
        with:
          ref: ${{ inputs.checkout_ref }}

      - name: Normalize image references
        id: refs
        run: |
          image="$(printf '%s' '${{ inputs.image_tag }}' | tr '[:upper:]' '[:lower:]')"
          extra="$(printf '%s' '${{ inputs.extra_image_tag }}' | tr '[:upper:]' '[:lower:]')"
          echo "image=$image" >> "$GITHUB_OUTPUT"
          {
            echo 'tags<<EOF'
            echo "$image"
            if [ -n "$extra" ]; then
              echo "$extra"
            fi
            echo 'EOF'
          } >> "$GITHUB_OUTPUT"

      - name: Set up QEMU
        uses: docker/setup-qemu-action@68827325e0b33c7199eb31dd4e31fbe9023e06e3 # v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@f4f5800b70e80e90593f2e9d1b66e0a5d68bedb8 # v3

      - name: Log in to GHCR
        uses: docker/login-action@5e57cd118135c172c3672efd75eb46360885c0ef # v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push image
        uses: docker/build-push-action@263435318d21b8e681c14492fe198d362a7d2c83 # v6
        with:
          context: .
          push: true
          platforms: linux/amd64,linux/arm64
          tags: ${{ steps.refs.outputs.tags }}
